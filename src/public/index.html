<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Printer Schedule Control</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                background: #f4f4f9;
                color: #333;
                max-width: 500px;
                margin: 50px auto;
                padding: 20px;
            }
            .card {
                background: white;
                padding: 20px;
                display: block;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }
            h1 {
                font-size: 1.5rem;
                margin-top: 0;
            }
            label {
                font-weight: bold;
                display: block;
                margin: 15px 0 5px;
            }
            select,
            input,
            button {
                width: 100%;
                padding: 10px;
                margin-bottom: 15px;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-sizing: border-box;
                font-size: 1rem;
            }
            button {
                background: #0076ff;
                color: white;
                border: none;
                font-weight: bold;
                cursor: pointer;
            }
            button:hover {
                background: #0056b3;
            }
            #status {
                padding: 10px;
                border-radius: 4px;
                font-weight: bold;
                display: none;
            }
            .success {
                background: #e6fffa;
                color: #006d5d;
                border: 1px solid #b2f5ea;
            }
            .error {
                background: #fff5f5;
                color: #9b2c2c;
                border: 1px solid #fed7d7;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Weather Printer Schedule</h1>
            <p>Select a preset time or provide a custom cron expression.</p>

            <label for="preset">Preset Times</label>
            <select id="preset">
                <option value="0 5 * * *">Every Day at 5:00 AM</option>
                <option value="0 6 * * *">Every Day at 6:00 AM</option>
                <option value="30 6 * * *">Every Day at 6:30 AM</option>
                <option value="0 7 * * *">Every Day at 7:00 AM</option>
                <option value="custom">Custom Cron Expression...</option>
            </select>

            <label for="cron">Cron Expression</label>
            <input
                type="text"
                id="cron"
                value="0 5 * * *"
                placeholder="e.g. 0 5 * * *"
            />

            <button id="updateBtn">Update Schedule</button>
            <div id="status"></div>
        </div>

        <script src="main.js"></script>
    </body>
</html>
